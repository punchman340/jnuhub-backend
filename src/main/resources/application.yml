server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jnuhub
    username: jnuhub_user
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false
    locations: classpath:db/migration

  profiles:
    default: local
    active: local

# API 키는 코드/깃에 넣지 말고 환경변수 GEMINI_API_KEY 로만 주입합니다. 값 자체는 로그에 남기지 않습니다.
gemini:
  api:
    key: ${GEMINI_API_KEY}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
    # 무료: flash-lite 는 종종 "free_tier … limit: 0". flash / 1.5-flash 사용 권장.
    model: gemini-2.0-flash
    max-retries: 5
